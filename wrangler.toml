name = "a-team-notify"
main = "dist/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cron Triggers for JST 8:30 and 17:00
# JST 8:30 = UTC 23:30 (previous day)
# JST 17:00 = UTC 8:00
[triggers]
crons = ["30 23 * * *", "0 8 * * *"]

# Environment variables
[vars]
# No public variables needed

# Secrets (use wrangler secret put to set these)
# - KINTONE_DOMAIN
# - KINTONE_APP_ID
# - KINTONE_API_TOKEN
# - LINEWORKS_WEBHOOK_URL
# - SLACK_BOT_TOKEN (optional)
# - SLACK_CHANNEL_ID (optional)
